kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: apache-manager
  namespace: apache
rules:
  - apiGroups: ["","rbac.authorization.k8s.io/v1","apps","batch"]
    resources: ["deployments", "pods", "services","hpa"]
    verbs: ["get", "apply","delete","watch","create","patch","list"]
