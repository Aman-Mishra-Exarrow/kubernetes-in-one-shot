kind: CustomResourceDefinition
apiVersion: apiextensions.k8s.io/v1
metadata:
  name: devopsbatches.amanmishra.co.in
spec:
  group: amanmishra.co.in
  names:
    plural: devopsbatches
    singular: devopsbatch
    kind: DevopsBatch
    shortNames:
      - batches
      - tws
      - junoon
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
         type: object
         properties:
           spec:
             type: object
             properties:
               name:
                 type: string
                 description: "This is the name of the devops batch"
               duration:
                 type: string
                 description: "This is the duration of the devops batch"
               mode:
                 type: string
                 description: "This is the mode of the batch eg. Live/Recorded"
               platform:
                 type: string
                 description: "This is the platform of the batch"
